name = "RouterOS Script"
grammar = "routeros"
path_suffixes = ["rsc"]
line_comments = ["# "]
tab_size = 4
hard_tabs = false

brackets = [
  { start = "\"", end = "\"", close = true, newline = false },
  { start = "{", end = "}", close = true, newline = true },
  { start = "(", end = ")", close = true, newline = false },
  { start = "[", end = "]", close = true, newline = false }
]

word_characters = ["-", "/", ":"]
completion_query_characters = ["-", "/", ":"]
