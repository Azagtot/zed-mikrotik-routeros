name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check language server syntax
        run: node --check server/routeros_lsp.mjs

      - name: Cargo check
        run: cargo check
